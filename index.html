<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <!-- Meta tags Obrigatórias -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">

    <title>Helpaw</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light fixed-top custom"> <!--css with custom, navbar-brand, nav-item-->
      <img class="img_logo" src="images/logo.png" alt="logo">
      <a class="navbar-brand" href="#">Helpaw</a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#conteudoNavbarSuportado" aria-controls="conteudoNavbarSuportado" aria-expanded="false" aria-label="Alterna navegação">
        <span class="navbar-toggler-icon"></span>
      </button>
    
      <div class="collapse navbar-collapse" id="conteudoNavbarSuportado">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item active">
            <a class="nav-link" href="#">Página inicial</a>
          </li>
          <li class="nav-item active">
            <a class="nav-link" href="#">Achei um pet</a>
          </li>
          <li class="nav-item active">
            <a class="nav-link" href="#">Perdi um pet</a>
          </li>
          <li class="nav-item active">
            <a class="nav-link" href="#">Ajudar pets perdidos</a>
          </li>
          <li class="nav-item search active">
            <a class="nav-link" href="#"><img src="images/vetores/search.png" alt="search" width="15px"> Search</a>
          </li>
        </ul>
        <button class="btn my-2 my-sm-0" type="submit">Pesquisar</button>
      </div>
    </nav>
    <!--CONTEÚDO PRINCIPAL-->
      <div class="principal">
        <div class="container-left">
          <div class="presentation">
            <h1>Perdeu ou encontrou <br> um pet?</h1>
            <p class="left_text">Este projeto contempla desenvolver um serviço que ajude a comunidade a encontrar, relatar e ajudar animais perdidos.</p>
            <div class="options">
              <a class="a_sr" href="#search"><img class="img_options" src="images/search.png" alt="search"><label class="sr_label" for="search">Procurar</label></a>

              <a class="a_sr" href="#report"><img class="img_options" src="images/report.png" alt="report"><label class="sr_label" for="report">Reportar</label></a>
            </div>
          </div>
        </div>
        <div class="container-right">
          <img class="img_main" src="images/main.png" alt="a dog and a cat">
        </div>
      </div>



    <!-- JavaScript (Opcional) -->
    <!-- jQuery primeiro, depois Popper.js, depois Bootstrap JS -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
  </body>
</html>
